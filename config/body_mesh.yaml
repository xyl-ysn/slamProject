# Direct node name for the GPU node. Empty means do not pin to the old server.
nodeName: ""

nodeSelector: {}

affinity: {}
tolerations: []
runtimeClassName: ""

image:
  repository: reg.zikirobo.com/zata-platform/zata-model-human-pose-tool
  tag: dev-v1.0.0
  pullPolicy: Always
imagePullSecrets: []

replicas: 1

# Service startup is not finalized yet. Leave empty to use the Dockerfile
# placeholder; set these values when the worker entrypoint is decided.
command: []
args: []

modelData:
  # Local project checkout on this machine.
  hostPath: /home/xieyongling/slam_project/ego-pose-project
  hostPathType: Directory
  readOnly: true
  external:
    subPath: third_party
    mountPath: /app/external/human_pose_tool
  weights:
    subPath: third_party
    mountPath: /app/weights/human_pose_tool

resources:
  limits:
    nvidia.com/gpu: 1

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

# Environment variables are rendered into a ConfigMap and loaded with envFrom.
# Keep values as strings because Kubernetes ConfigMap data is string-only.
env:
  SERVICE_NAME: "zata-model-human-pose-tool"
  SERVICE_VERSION: "1.0.0"
  MODEL_TYPE: "human_pose_tool"
  MODEL_NAMES: "EgoAllo,GeoCalib"
  ZATA_MANAGER_BASE_URL: "http://10.9.103.101:31052"
  ZATA_MANAGER_POLL_INTERVAL: "3"
  ZATA_MANAGER_CALLBACK_TIMEOUT: "30"
  ZATA_MANAGER_PROGRESS_INTERVAL: "2"
  ZATA_MANAGER_FINAL_PROGRESS_RETRIES: "3"
  ZATA_MANAGER_FINAL_PROGRESS_RETRY_INTERVAL: "2"
  MAX_WORKERS: "1"
  GPU_CLEANUP_AFTER_TASK: "true"
  SIDECAR_ENABLED: "false"
  SIDECAR_DIR: ""
  LOG_LEVEL: "INFO"
  LOG_DETAILED_FORMAT: "false"
  LOG_ENQUEUE: "false"
  WORKER_LOG_FILE: ""
  VIDEO_CACHE_ROOT: "/tmp/zata-model-worker-cache"

config: &body_mesh_config
  runtime:
    device: cuda

  model_sources:
    egoallo_root: third_party/egoallo
    geocalib_root: third_party/GeoCalib
    moge_root: third_party/MoGe

  model_weights:
    egoallo_checkpoint_dir: third_party/egoallo/egoallo_checkpoint_april13
    egoallo_model_config_path: third_party/egoallo/egoallo_checkpoint_april13/model_config.yaml
    egoallo_model_npz: third_party/egoallo/data/smplh/neutral/model.npz

    geocalib_pinhole_tar: /home/xieyongling/.cache/torch/hub/geocalib/pinhole.tar

    mano_left_pkl: model/MANO_LEFT.pkl
    mano_right_pkl: model/MANO_RIGHT.pkl

    smplh_npz_path: third_party/egoallo/data/smplh/neutral/model.npz
    # 本机当前没有找到 MoGe model.pt；留空时 run_body_mesh.py 会跳过 MoGe，
    # 继续使用 hands / height fallback 做 metric scale。
    moge_model_pt: third_party/MoGe/weight/model.pt

  output_layout:
    tmp_dir_name: tmp
    egoallo_inputs_dir_name: egoallo_inputs
    egoallo_outputs_dir_name: egoallo_outputs
    ego_tmp_dir_name: ego_tmp
    final_scene_name: final_scene.ply
    final_smoothed_name: merged_smoothed_vis.npz
    pipeline_log_json_name: pipeline_run_log.json

    cleanup:
      tmp: false
      egoallo_inputs: false
      ego_tmp: false

  hawor_extract:
    # 这些参数决定“上游检测到的手”有多少会真正进入 EgoAllo 的 hamer_outputs.pkl。
    # 如果怀疑手部约束太少，可以临时改成：
    #   drop_isolated: false
    #   min_track_len: 1
    #   soft_start_frames: 1
    #   soft_end_frames: 1
    # 这样会尽量保留检测帧并给满权重，但更容易把抖动/误检也作为强约束。
    soft_start_frames: 15
    soft_end_frames: 10
    min_output_alpha: 0.0
    drop_isolated: true
    min_track_len: 3
    trim_segment_edges: 0
    max_gap_fill: 3
    max_gap_endpoint_hand_ratio: 1.5
    smooth_window: 5
    smooth_mode: translation
    soft_start_geometry: true
    soft_start_anchor_max_gap: 45
    max_wrist_step_hand_ratio: 1.5
    print_jump_stats: true

  hawor_stabilize:
    max_wrist_step_hand_ratio: 1.5
    min_track_len: 6
    soft_start_frames: 20
    soft_end_frames: 10
    min_alpha_to_keep: 0.0
    duplicate_mode: drop_both

  hamer_build:
    mano_frame_key: frame_id
    mano_lookup_field: frame_id
    cam_space_left_subdir: "0"
    cam_space_right_subdir: "1"

  geocalib:
    device: auto
    num_samples: 60
    min_confidence: 3000

    anchor_policy: top_k_best_uncertainty
    top_k_anchors: 5
    follow_frames: 2
    empty_policy: skip

    viz_enabled: false
    viz_dir_name: geocalib_viz
    viz_save_all_sampled: false
    viz_save_selected: false

  alignment:
    use_geocalib_prior: true
    geocalib_vector_type: gravity
    geocalib_switch_angle_deg: 10.0
    geocalib_outlier_angle_deg: 15.0

    geocalib_precheck_height: true
    fallback_to_ransac_on_invalid_height: true
    min_valid_camera_height_margin_factor: 2.0
    min_camera_above_floor_ratio: 0.95
    min_camera_p10_height_margin_factor: -2.0

  metric_scale:
    enabled: true
    floor_z: 0.0

    # 最终写出 final_scene.ply 时做一次降采样。0 表示不降采样。
    # 02_apply_alignment_da3_geocalib.py 现在默认只输出 head_trajectory.npy，不再写中间 aligned_scene.ply。
    #点云降采样
    final_scene_output_voxel_size: 0.003

    # 尺度估计优先级：
    # 1. 手骨架
    # 2. MoGe
    # 3. 疑似直立阶段头部高度
    # 4. 都失败则 warning + scale=1.0
    scale_priority:
      - hands
      - moge
      - height
      - none

    # MoGe scale 后验检查：
    # 这里的 min/max 只用于 MoGe 的 p90 头高 sanity check。
    # hand scale 不用这个区间拒绝，只在 p90 头高超过 hand_fallback.max_p90_head_height 时缩小。
    scale_sanity:
      enabled: true
      statistic: percentile
      percentile: 90

      # 这里故意比 1.50-1.60 宽很多，避免弯腰/低头误杀 MoGe
      min_valid_head_height: 0.80
      max_valid_head_height: 1.70

      reject_moge_if_invalid_height: true
      reject_hands_if_invalid_height: false

    moge:
      enabled: true
      output_dir_name: moge_metric_scale

      # 先均匀抽 48 帧作为候选，只做 CPU 轻量质量检查
      candidate_samples: 48

      # 从候选帧中选质量最好的 24 帧真正跑 MoGe
      # 想快可以 16，想稳可以 32
      num_samples: 24

      # MoGe scale 最终至少需要多少有效帧
      min_valid_frames: 4
      min_valid_pixels: 1000

      min_depth_m: 0.2
      max_depth_m: 8.0

      min_scale: 0.05
      max_scale: 20.0
      max_frame_relative_mad: 0.35
      max_final_relative_mad: 0.35

      # MoGe 投影有效点质量检查。有效点指 MoGe depth / 重建投影 depth 都有效，
      # 且 ratio 在 min_scale/max_scale 内、真正参与 scale 估计的像素。
      projection_quality_enabled: true

      # 投影点 bbox 覆盖图像面积比例，太小说明只集中在很小区域
      min_projection_area_ratio: 0.01

      # 有效点的 MoGe 深度 p95-p05 范围，太小说明深度层次不足
      min_depth_range_m: 0.25

      # 近/中/远三层中，每层至少占多少才算被覆盖
      min_depth_layer_ratio: 0.03

      # 至少覆盖几层深度，避免只来自单一深度平面
      min_depth_layer_count: 2

      # 中心 50% 图像区域内有效点占比，超过则认为过度集中在图像中心
      max_center_region_ratio: 0.90

      # 静态背景代理分数：覆盖面积、深度范围、深度分层、空间分散度综合得分
      min_static_background_score: 0.35

      max_points: 250000
      device: cuda
      fp16: true
      resolution_level: 9
      use_intrinsics_fov: true

      save_depth_maps: false
      save_projection_matches: false
      save_sampled_frames: false

      # CPU 轻量图像质量检查阈值
      # 亮度均值太低认为过暗
      min_quality_brightness: 25.0

      # 亮度均值太高认为过曝
      max_quality_brightness: 235.0

      # 暗像素比例太高则降分或过滤
      max_quality_dark_ratio: 0.45

      # 过曝像素比例太高则降分或过滤
      max_quality_bright_ratio: 0.45

      # Laplacian 方差，越小越模糊
      min_quality_laplacian_var: 20.0

      # 灰度标准差，越小说明纹理/对比度越少
      min_quality_texture_std: 8.0

      # 边缘密度，越小说明纹理/结构太少
      min_quality_edge_density: 0.01

      # 边缘判断阈值
      quality_edge_threshold: 20.0

      # 建议 false：MoGe 失败不要中断，继续 fallback 到 hands / height / none
      strict: false

    hand_fallback:
      enabled: true
      min_valid_bones: 20
      max_relative_mad: 0.35
      min_scale: 0.05
      max_scale: 20.0
      max_p90_head_height: 1.65

      bones:
        - name: wrist_middle_mcp
          i: 0
          j: 9
          length_m: 0.095

        - name: index_pinky_mcp
          i: 5
          j: 17
          length_m: 0.075

    # 第三 fallback：找疑似直立阶段的头部高度，而不是全段 median
    height_fallback:
      enabled: true
      mode: standing_head_height
      statistic: percentile
      percentile: 90

      # 直立时头部/头戴相机离地高度目标值
      target_height: 1.55

      min_valid_height: 0.5
      max_valid_height: 2.9
      min_candidate_frames: 10

      min_scale: 0.05
      max_scale: 20.0
      smooth_window: 1

    frontend:
      enabled: true
      include_mesh: false

      # 这两个文件名现在可以从 YAML 改
      head_jsonl_name: head_trajectory_egoallo.jsonl
      hands_jsonl_name: hand_keypoints_egoallo.jsonl

  egoallo:
    # EgoAllo 分段推理参数：
    # - target_segment_length 是每段最终保存的帧数。
    # - context_frames 是每段推理时额外读取的前后输入帧，只提供 head/hands/timestamps 上下文。
    # - save_only_center=true 时，只保存 target 中心段，context 部分会被裁掉。
    # 例：target_segment_length=512, context_frames=30 时，
    #   第 2 段 target=512-1024，实际 infer=482-1054，最后只保存 512-1024。
    # 并行模式下，每段是独立 Python 进程；context_frames 不会读取上一段生成的人体 pose。
    target_segment_length: 512

    # 每段推理时额外看前后多少帧。数值越大，边界上下文越多，但显存估算也越高。
    context_frames: 20

    # 只保存中间目标段，不保存上下文重叠部分
    save_only_center: true

    guidance_mode: hamer_wrist
    guidance_inner: true
    guidance_post: true

    glasses_x_angle_offset: 0.0
    start_index: 0
    end_index: null
    segment_index_offset: 0
    num_samples: 1
    floor_z: 0.0

    save_traj: true
    save_args: false
    empty_cache_each_segment: false
    allow_tf32: true

    expected_head_height_min: 1.0
    expected_head_height_max: 2.2

    # 以下参数会覆盖 EgoAllo 的采样与约束参数。
    # 05_run_egoallo_from_head.py 直接从 body_mesh.yaml 读取该段配置。
    config:
      sampling:
        # 模型扩散时间轴仍为 1000，实际采样运行 50 步
        num_steps: 1000 
        window_size: 128 
        overlap_size: 32 
        keep_intermediate_states: false 
        cache_clear_every_steps: 0 
        use_expanded_window_tiles: true

      guidance:
        inner:
          early_termination: true
          cost_tolerance: 1e-5
          gradient_tolerance: 1e-4
          parameter_tolerance: 1e-6

          # 原来的 10 对 inner_max_iters=1 完全不起作用
          gradient_tolerance_start_step: 1

        post:
          early_termination: true
          cost_tolerance: 1e-5
          gradient_tolerance: 1e-4
          parameter_tolerance: 1e-6

          # post 最多 10 次，从第 2 次开始检查 gradient
          gradient_tolerance_start_step: 2

      constraint_optimization:
        enabled: true

        # 50 步里最后 24 步，每 3 步执行一次，共约 8 次
        # 保持和当前 80/10 大致相同的 inner 触发次数
        inner_max_iters: 1
        inner_last_steps: 6
        inner_step_frequency: 3

        # 最终完整修正一次，通过 early termination 控制平均迭代数
        post_max_iters: 8
        post_last_steps: 0
        post_step_frequency: 1
        post_timing_repeat: 1
        bucket_t: auto
        detection_bucket: 0
        warmup_before_segments: true

        # 质量核心：保留手部约束
        enable_hand_constraints: true

        # 先关闭最容易慢/炸的约束
        enable_foot_constraints: true
        enable_collision_constraints: true

        # 这个可以先 false；如果身体明显不稳，再改 true
        enable_body_regularization: true

      inference:
        use_torch_compile: false

      denoiser:
        compile_model: false
  smooth:
    enabled: true

    # 只在 EgoAllo 分段接缝前后做局部 blend，缓解分段独立采样导致的人体跳变。
    # 数值越大，边界越平滑，但越可能抹掉接缝附近的真实动作。36,15,0.2
    boundary_blend_frames: 36

    # root translation 滑窗平滑。0/1 表示关闭；偶数会自动提升为下一个奇数。
    translation_smooth_window: 15

    # 旋转低通平滑。0 表示关闭。
    # 建议先试 0.15；如果仍抖，试 0.20~0.30。
    quat_lowpass_alpha: 0.20

    print_stats: true
    strict_frame_continuity: false
    report_json_name: motion_quality_report.json
    
  jax_guidance:
    compilation_cache:
      enabled: true
      cache_subdir: jax_compilation_cache
      min_compile_time_secs: 0
      min_entry_size_bytes: -1
      enable_xla_caches: xla_gpu_per_fusion_autotune_cache_dir
      explain_cache_misses: false
      debug_log_modules: false

  python_cache:
    redirect_pycache_to_tmp: true
    pycache_subdir: pycache
    cleanup_existing_scripts_pycache: true

# Also expose the algorithm config at the YAML top level for local runs:
#   python scripts/run_body_mesh.py --config config/body_mesh.yaml ...
<<: *body_mesh_config
